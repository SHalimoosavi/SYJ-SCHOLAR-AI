name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Run Ruff (linter)
        run: ruff check scholar/ tests/ main.py

      - name: Run Black (format check)
        run: black --check scholar/ tests/ main.py

  # ── Test matrix ─────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            tesseract-ocr \
            tesseract-ocr-eng \
            poppler-utils \
            libmupdf-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov fpdf2

      - name: Install package (editable)
        run: pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=scholar \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_pdf_reader.py

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── PDF reader test (needs fpdf2 + fitz) ────────────────────────────────────
  test-pdf:
    name: PDF Reader Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q tesseract-ocr tesseract-ocr-eng
          pip install --upgrade pip
          pip install PyMuPDF pdfplumber pytesseract Pillow fpdf2
          pip install pytest loguru platformdirs pydantic
          pip install -e .

      - name: Run PDF reader tests
        run: pytest tests/test_pdf_reader.py -v --tb=short

  # ── Install script smoke test ────────────────────────────────────────────────
  install-smoke:
    name: Install Script (dry-run check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check install.sh syntax
        run: bash -n install.sh

      - name: Verify install.sh is executable
        run: test -x install.sh

  # ── Build distribution ──────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7
